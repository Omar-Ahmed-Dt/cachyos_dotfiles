[main]
font=JetBrainsMono Nerd Font:size=8
dpi-aware=auto
terminal=kitty
icons-enabled=no
prompt="> "
width=50
lines=15
anchor=center
use-bold=no
match-mode=fzf
sort-result=yes
match-counter=yes
exit-on-keyboard-focus-loss=yes
minimal-lines=yes

[colors]
background=2e3440ff
text=d8dee9ff
input=d8dee9ff
match=88c0d0ff
selection=3b4252ff
selection-text=eceff4ff
border=81a1c1ff
prompt=88c0d0ff

[border]
width=2
radius=8

[dmenu]
exit-immediately-if-empty=yes

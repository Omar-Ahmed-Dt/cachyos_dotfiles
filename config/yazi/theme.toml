[git]
unknown       = { fg = "gray", bold = true }
modified      = { fg = "yellow", bold = true }
added         = { fg = "green", bold = true }
untracked     = { fg = "blue", bold = true }
ignored       = { fg = "darkgray", bold = true }
deleted       = { fg = "red", bold = true }
updated       = { fg = "cyan", bold = true }
clean         = { fg = "green", bold = true }
# unknown_sign   = "?"
modified_sign  = "M"
added_sign     = "A"
untracked_sign = "U"
ignored_sign   = "I"
deleted_sign   = "D"
updated_sign   = "C"
clean_sign     = "✔"


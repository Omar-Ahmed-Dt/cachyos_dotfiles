[mgr]
keymap = [
    { on = ["'"], run = "plugin augment-command -- first_file", desc = "Jump to first file"}, 
    { on = ["b", "r"], run = "cd ~/rnote", desc = "Go to rnote" },
    { on = ["b", "m"], run = "cd /mnt/", desc = "Go to /mnt/" },
    { on = ["b", "g"], run = "cd ~/Documents/GitHub", desc = "Go to GitHub" },
    { on = ["b", "D"], run = "cd ~/Documents/", desc = "Go to Documents" },
    { on = ["b", "d"], run = "cd ~/Downloads", desc = "Go to Downloads" },
    { on = ["b", "h"], run = "cd ~", desc = "Go to Home" },
    { on = ["b", "s"], run = "cd ~/scripts", desc = "Go to Scripts" },
    { on = ["b", "f"], run = "cd ~/ffmpeg", desc = "Go to FFmpeg" },
    { on = ["b", "w"], run = "cd ~/wallpapers", desc = "Go to Wallpapers" },
    { on = ["b", "y"], run = "cd ~/Documents/youtube/", desc = "Go to My YouTube Videos" },
    { on = ["b", "Y"], run = "cd ~/youtube-dl", desc = "Go to YouTube DL" },
    { on = ["b", "t"], run = "cd ~/.local/share/Trash/files", desc = "Go to Trash" },
    { on = ["b", "S"], run = "cd ~/screenshots", desc = "Go to Screenshots" },
    { on = ["b", "c"], run = "cd ~/.config", desc = "Go to Config" },
    { on = ["b", "C"], run = "cd ~/cv", desc = "Go to cv" },
    # { on = ["b", "p"], run = "cd ~/pins", desc = "Go to Pins" },
    { on = ["b", "p"], run = "cd ~/Pictures", desc = "Go to Pictures" },
    { on = ["b", "M"], run = "cd ~/Music", desc = "Go to Music" },
    { on = ["b", "v"], run = "cd ~/Videos", desc = "Go to Videos" },
    { on =["s"], run = 'shell "$SHELL" --block --confirm', desc = "Open shell in the current directory" },
    { on =["S"], run = 'suspend', desc = "suspend" },
    { on = "<Esc>", run = "escape -all", desc = "Cancel" },
    { on = ["Q"], run = "quit", desc = "Exit the process" },
    { on = ["q"], run = "close", desc = "Close current tab, or quit if last" },
    { on = ["k"], run = "arrow -1", desc = "Move cursor up" },
    { on = ["j"], run = "arrow 1", desc = "Move cursor down" },
    { on = ["h"], run = "leave", desc = "Go to parent" },
    { on = ["l"], run = "plugin --sync smart-enter", desc = "Enter dir / open file" },
    { on = ["<Enter>"], run = "plugin --sync smart-enter", desc = "Enter dir / open file" },
    { on = ["<Up>"], run = "arrow -1", desc = "Move cursor up" },
    { on = ["<Down>"], run = "arrow 1", desc = "Move cursor down" },
    { on = ["<Left>"], run = "leave", desc = "Go to parent" },
    { on = ["<Right>"], run = "plugin --sync smart-enter", desc = "Enter dir / open file" },
    { on = ["g","g"], run = "arrow -99999999", desc = "Top" },
    { on = ["G"], run = "arrow 99999999", desc = "Bottom" },
    { on = [ "<C-u>" ], run = "arrow -50%", desc = "Move up half page" },
    { on = [ "<C-d>" ], run = "arrow 50%", desc = "Move down half page" },
    { on = [ "v" ], run = "visual_mode", desc = "Enter visual mode" },
    { on = "V", run = "visual_mode --unset", desc = "Enter visual mode (unset mode)" },
    { on = [ "<Esc>" ], run = "visual_mode --unset", desc = "Exit visual mode" },
    { on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "Toggle the current selection state" },
    { on = "<C-a>",   run = "toggle_all --state=on", desc = "Select all files" },
    { on = "<C-r>",   run = "toggle_all",            desc = "Invert selection of all files" },
    { on = "o", run = '''shell 'swayimg -g' --confirm''', desc = "Open selected files interactively" },
    { on = ["y"], run = "yank", desc = "Yank (copy)" },
    { on = "Y",  run = "unyank",    desc = "Cancel the yank status" },
    { on = ["d"], run = "yank --cut", desc = "Yank (cut)" },
    { on = "D",  run = "unyank",    desc = "Cancel the yank status" },
    { on = ["p"], run = "paste", desc = "Paste" },
    { on = ["P"], run = "paste --force", desc = "Paste (overwrite)" },
    { on = ["x"], run = "remove", desc = "Trash selected files" },
    { on = ["r"], run = "rename", desc = "Rename" },
    { on = ["a", "f"], run = "create", desc = "Create file" },
    { on = ["a", "d"], run = "create --dir", desc = "Create directory" },
    { on = ["f"], run = "find --smart", desc = "Find next" },
    { on = ["n"], run = "find_arrow", desc = "Next match" },
    { on = ["N"], run = "find_arrow --previous", desc = "Prev match" },
    { on = ["/"], run = "filter --smart", desc = "Filter" },
    { on = ["T"], run = "tab_create --current", desc = "New tab with CWD" },
    { on = ["H"], run = "tab_switch -1 --relative", desc = "Prev tab" },
    { on = ["L"], run = "tab_switch 1 --relative", desc = "Next tab" },
    { on = ["."], run = "hidden toggle", desc = "Toggle hidden files" },
    { on = ["~"], run = "help", desc = "Open help" },
    { on = ["t", "a"], run = "sort alphabetical --reverse=no", desc = "Sort A → Z" },
    { on = ["t", "A"], run = "sort alphabetical --reverse=yes", desc = "Sort Z → A" },
    { on = ["t", "t"], run = "sort mtime --reverse", desc = "sort by time" },
    { on = ["t", "T"], run = "sort mtime --reverse=no", desc = "sort by time" },
    { on = ["t", "s"], run = "sort size --reverse=no", desc = "Sort by size ascending" },
    { on = ["t", "S"], run = "sort size --reverse=yes", desc = "Sort by size descending" },
    { on = "Z",         run = "plugin fzf",                  desc = "Jump to a file via fzf" },
    { on = "z",         run = "plugin zoxide",               desc = "Jump to a directory via zoxide" },
  	{ on = [ "c", "p" ], run = "copy path",             desc = "Copy the file path" },
	{ on = [ "c", "d" ], run = "copy dirname",          desc = "Copy the directory path" },
	{ on = [ "c", "f" ], run = "copy filename",         desc = "Copy the filename" },
    { on = ["c", "c"], run = "plugin copy-file-contents", desc = "Copy contents of file" },
    { on = ["c", "v"], run = "shell '~/scripts/tomp4.sh \"$@\"'", desc
    = "convert to mp4" },
    { on = "1", run = "tab_switch 0", desc = "Switch to first tab" },
	{ on = "2", run = "tab_switch 1", desc = "Switch to second tab" },
	{ on = "3", run = "tab_switch 2", desc = "Switch to third tab" },
	{ on = "4", run = "tab_switch 3", desc = "Switch to fourth tab" },

    { on = ["g","c"], run = "plugin vcs-files", desc = "Show Git file changes" },
    { on = "u", run = "plugin jump-to-char", desc = "Jump to char" },
    { on = "<C-y>", run = [ "yank", "plugin clipboard -- --action=copy" ], desc = "Yank + copy to clipboard" },
    { on = "<C-p>", run = [ 'plugin clipboard -- --action=paste' ],         desc = "Paste from clipboard" },
    { on = "w", run = "tasks:show", desc = "Open task manager" },
    { on = "d", run = "tasks:cancel", desc = "Cancel selected task" },
    { on = "O", run = "shell -- ripdrag %s -x 2>/dev/null &" },
    { on = ["c", "y"], run = 'shell "wl-copy -t image/png < $0" --confirm', desc = "Copy image" },
    { on = "<C-o>", run = "back", desc = "Go back to previous directory" },
    { on = "<C-i>", run = "forward", desc = "Go forward to next directory" },

    # ya pkg add dedukun/relative-motions
    { on = "m", run = "plugin relative-motions", desc = "Trigger a new relative motion" },
]

[help]
keymap = [
    { on = [ "<Esc>" ], run = "escape", desc = "Close help" },
    { on = [ "q" ], run = "close", desc = "Close help" },
    { on = [ "k" ], run = "arrow -1", desc = "Move up" },
    { on = [ "j" ], run = "arrow 1", desc = "Move down" },
    { on = [ "<C-u>" ], run = "arrow -50%", desc = "Move up half page" },
    { on = [ "<C-d>" ], run = "arrow 50%", desc = "Move down half page" },
    { on = [ "g", "g" ], run = "arrow -99999999", desc = "Go to top" },
    { on = [ "G" ], run = "arrow 99999999", desc = "Go to bottom" },
    { on = "/", run = "filter", desc = "Filter help items" },
]

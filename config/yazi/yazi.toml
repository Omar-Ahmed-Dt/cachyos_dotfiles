[manager]
ratio          = [ 1, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
mouse_events   = [ "click", "scroll" , "drag"]
status = "{cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1000
max_height      = 1500
cache_dir       = "/home/omar/.cache/yazi"
image_filter    = "triangle"
image_delay     = 30
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
image = [
    # { run = 'env -u SWAYSOCK swayimg "$@"', orphan = true },
    { run = 'swayimg "$@"', orphan = true },
]

media = [
    { run = 'mpv --player-operation-mode=pseudo-gui "$@"', orphan = true }
]

text = [
    # { run = 'nvim "$@"', block = true },
    # { run = 'kitty --detach nvim "$@"', orphan = true }
    { run = "nvim %s", block = true, desc = "Edit with nvim", for = "unix" },
]

pdf = [
    { run = 'zathura "$@"', orphan = true }
]

office = [
    { run = 'libreoffice "$@"', orphan = true }
]

rnote = [
   # run this command: flatpak override --user com.github.flxzt.rnote --filesystem=home 
   { run = 'flatpak run com.github.flxzt.rnote "$@"', orphan = true }
   # { run = 'rnote "$@"', orphan = true }
]

extract = [ 
    { run = "ya pub extract --list %s", desc = "Extract here" }
]

[open]
rules = [
    { mime = "image/*", use = "image" },
    { mime = "video/*", use = "media" },
    { mime = "audio/*", use = "media" },

    # Empty or text files open in nvim
    { url = "*.sh", use = "text" },
    { url = "*.txt", use = "text" },
    { url = "*.md", use = "text" },
    { url = "*.toml", use = "text" },
    { url = "*.conf", use = "text" },
    { url = "bulk-rename.txt", use = "text" },
    { mime = "inode/x-empty", use = "text" },
    { mime = "text/*", use = "text" },
    { mime = "application/json", use = "text" },
    { mime = "application/pdf", use = "pdf" },
    { url = "*.rnote", use = "rnote" },
    { url = "*.odt", use = "office" },

    { mime = "application/{zip,rar,7z*,tar,xz,zstd,gzip,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
]

[tasks]
micro_workers    = 10
macro_workers    = 10
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [ 10000, 10000 ]
suppress_preload = false

[input]
# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# trash
trash_title     = "Move {n} selected file{s} to trash? (y/N)"
trash_origin    = "top-center"
trash_offset    = [ 0, 2, 50, 3 ]

# delete
delete_title    = "Delete {n} selected file{s} permanently? (y/N)"
delete_origin   = "top-center"
delete_offset   = [ 0, 2, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

# overwrite
overwrite_title  = "Overwrite an existing file? (y/N)"
overwrite_origin = "top-center"
overwrite_offset = [ 0, 2, 50, 3 ]

# quit
quit_title  = "{n} task{s} running, sure to quit? (y/N)"
quit_origin = "top-center"
quit_offset = [ 0, 2, 50, 3 ]

[select]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false

[log]
enabled = false

# ya pkg add yazi-rs/plugins:git
[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
